<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Weones de las Empanadas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #0a0a0a; color: #fff; padding: 20px; text-align: center; }
    .btn { background: #ff6600; padding: 15px; border-radius: 10px; border: none; color: #000; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .oculto { display: none; }
    .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    input { padding: 10px; border-radius: 5px; border: 1px solid #333; }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div>
      <h1>LOGIN</h1>
      <input type="password" id="pass" placeholder="Clave">
      <button class="btn" onclick="Auth.login()">ENTRAR</button>
    </div>
  </div>

  <div id="appContent" class="oculto">
    <h1>CAJA DIARIA</h1>
    <p>Caja Inicial: <span id="mostrar-caja-inicial">$0</span></p>
    <button class="btn" onclick="alert('Sistema Conectado a la Nube')">BOTÓN DE PRUEBA</button>
  </div>

  <script>
    // 1. CONEXIÓN A SUPABASE
    const dbClient = supabase.createClient('https://ibiqpvfrwzlunvovixyf.supabase.co', 'sb_publishable_WaCE6FvGEOIkFyGf0SCqqw_hNqt5uNz');

    // 2. LÓGICA DE AUTENTICACIÓN
    const Auth = {
        login() {
            const p = document.getElementById('pass').value;
            if (p === '1971') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContent').classList.remove('oculto');
                App.init();
            } else {
                alert('Clave incorrecta');
            }
        }
    };

    // 3. LÓGICA DE DATOS
    const App = {
        async init() {
            try {
                // Consultamos a la base de datos
                const { data, error } = await dbClient.from('configuracion').select('caja_inicial').eq('id', 1).single();
                
                if (data) {
                    document.getElementById('mostrar-caja-inicial').textContent = '$' + data.caja_inicial.toLocaleString();
                } else if (error) {
                    console.error("Error en Supabase:", error);
                }
            } catch (e) {
                console.error("Error crítico:", e);
            }
        }
    };
  </script>
</body>
</html>
