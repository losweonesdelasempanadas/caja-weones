<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja Emporio Don Nino</title>
  <style>
    body{font-family:sans-serif;background:#0a0a0a;color:#fff;padding:10px;margin:0}
    .container{max-width:500px;margin:0 auto;padding-top:150px;}
    .top-fijo{position:fixed;top:0;width:100%;max-width:500px;background:#0a0a0a;padding:10px;z-index:1000}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
    .tab{padding:10px;background:#222;border:none;color:#fff;border-radius:8px;cursor:pointer}
    .tab.activo{background:#ff6600}
    .pantalla{display:none}.pantalla.activa{display:block}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .prod{background:#1a1a1a;padding:20px;border-radius:10px;text-align:center;border:1px solid #333}
    .btn{width:100%;padding:15px;background:#ff6600;border:none;border-radius:10px;font-weight:bold;margin-top:10px}
    .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999}
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div style="text-align:center;width:80%">
    <h1>🔑 ACCESO</h1>
    <input type="password" id="pass" style="width:100%;padding:15px;margin:20px 0;background:#222;color:#fff;border:1px solid #555" placeholder="Clave">
    <button class="btn" onclick="validar()">ENTRAR</button>
  </div>
</div>

<div class="container">
  <div class="top-fijo">
    <div class="tabs">
      <button class="tab activo" onclick="tab('vender')">VENDER</button>
      <button class="tab" onclick="tab('stock')">STOCK</button>
      <button class="tab" onclick="tab('resumen')">RESUMEN</button>
      <button class="tab" onclick="tab('respaldo')">RESPALDO</button>
    </div>
  </div>

  <div id="vender" class="pantalla activa">
    <div class="grid" id="lista"></div>
    <div id="total" style="font-size:24px;margin:20px 0">Total: $0</div>
    <button class="btn" onclick="vender()">REGISTRAR VENTA</button>
    <button class="btn" style="background:#cc0000" onclick="anular()">ANULAR</button>
  </div>

  <div id="stock" class="pantalla">
    <button class="btn" style="background:#cc0000" onclick="cerrarDia()">CERRAR DÍA Y REINICIAR</button>
  </div>

  <div id="resumen" class="pantalla">
    <h3>HISTORIAL DE VENTAS</h3>
    <div id="historial"></div>
  </div>

  <div id="respaldo" class="pantalla">
    <button class="btn" onclick="backup()">DESCARGAR JSON</button>
  </div>
</div>

<script>
  const HASH = 'MTk3MQ==';
  let carrito = {};
  let ventas = [];
  const PRODS = [
    {id:1,n:"Empanada",p:2500},
    {id:2,n:"Coca lata",p:1000}
  ];

  function validar() {
    if (btoa(document.getElementById('pass').value) === HASH) {
      document.getElementById('loginScreen').style.display = 'none';
      renderVender();
    } else { alert('Error'); }
  }

  function renderVender() {
    const grid = document.getElementById('lista');
    grid.innerHTML = PRODS.map(p => `<div class="prod" onclick="add(${p.id})"><h3>${p.n}</h3><p>$${p.p}</p></div>`).join('');
  }

  function add(id) {
    carrito[id] = (carrito[id] || 0) + 1;
    let t = 0;
    for(let i in carrito) t += PRODS.find(p=>p.id==i).p * carrito[i];
    document.getElementById('total').innerText = "Total: $" + t;
  }

  function vender() {
    ventas.push({items: {...carrito}, total: document.getElementById('total').innerText});
    carrito = {};
    document.getElementById('total').innerText = "Total: $0";
    renderHistorial();
    alert('Venta Guardada');
  }

  function renderHistorial() {
    document.getElementById('historial').innerHTML = ventas.map(v => `<div style="border-bottom:1px solid #333;padding:10px">${v.total}</div>`).join('');
  }

  function tab(t) {
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
    document.getElementById(t).classList.add('activa');
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('activo'));
    event.target.classList.add('activo');
  }

  function cerrarDia() {
    if(confirm('¿Borrar todo?')) { localStorage.clear(); location.reload(); }
  }

  function backup() {
    const a = document.createElement('a');
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ventas));
    a.download = "respaldo.json"; a.click();
  }

  function anular() { carrito = {}; document.getElementById('total').innerText = "Total: $0"; }
</script>
</body>
</html>
