<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Weones de las Empanadas - CAJA V2.0</title>
  <style>
    /* MANTIENE TUS ESTILOS ORIGINALES */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0a0a0a;color:#fff;padding:10px;min-height:100vh}
    .container{max-width:500px;margin:0 auto;position:relative;padding-top:240px;}
    .top-fijo { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0a0a0a; z-index: 1000; padding: 10px; }
    .header{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);padding:12px;border-radius:16px;border:1px solid #ff6600;text-align:center;margin-bottom:8px}
    .header h1{font-size:20px;color:#ff6600;font-weight:bold}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:5px}
    .tab{padding:12px 4px;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#888;font-size:12px;font-weight:bold;cursor:pointer}
    .tab.activo{background:#ff6600;color:#000;border-color:#ff6600}
    .pantalla{display:none}.pantalla.activa{display:block}
    .productos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .producto{background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:16px;text-align:center}
    .btn{width:100%;padding:16px;background:#ff6600;border:none;border-radius:14px;font-weight:bold;cursor:pointer;margin-top:10px}
    .oculto{display:none!important}
    .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-box{background:#1a1a1a;padding:40px;border-radius:20px;border:2px solid #ff6600;width:90%;max-width:400px;text-align:center}
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>🥟 LOS WEONES 🥟</h1>
      <div class="input-grupo">
        <label>USUARIO</label>
        <select id="loginUser"><option value="Marcelo">Marcelo</option><option value="Nataly">Nataly</option></select>
      </div>
      <div class="input-grupo">
        <label>CLAVE</label>
        <input type="password" id="loginPass" placeholder="Clave">
      </div>
      <button class="btn" onclick="Auth.login()">ENTRAR</button>
    </div>
  </div>

  <div class="container">
    <div class="top-fijo">
      <div class="header"><h1>LOS WEONES DE LAS EMPANADAS</h1></div>
      <div class="tabs">
        <button class="tab activo" onclick="App.cambiarTab('vender')">VENDER</button>
        <button class="tab" onclick="App.cambiarTab('stock')">STOCK</button>
        <button class="tab" onclick="App.cambiarTab('resumen')">RESUMEN</button>
        <button class="tab" onclick="App.cambiarTab('respaldo')">RESPALDO</button>
      </div>
    </div>

    <div id="vender" class="pantalla activa">
      <div id="productos-grid" class="productos-grid"></div>
    </div>
    
    <div id="stock" class="pantalla"></div>
    <div id="resumen" class="pantalla"></div>
    <div id="respaldo" class="pantalla"></div>
  </div>

  <script>
    const CLAVE_HASH = 'MTk3MQ==';
    const PRODUCTOS = [
      {id:1,nombre:"Empanada",precio:2500,icono:"🥟"},
      {id:3,nombre:"Coca lata",precio:1000,icono:"🥫"}
    ];
    let estado = { carrito: {}, stockActual: {}, ventas: [], diaActivo: false };

    const Auth = {
      login() {
        const pass = document.getElementById('loginPass').value;
        if (btoa(pass) !== CLAVE_HASH) { alert('Clave incorrecta'); return; }
        
        // CORRECCIÓN: Al entrar, ocultamos login e inicializamos todo
        document.getElementById('loginScreen').style.display = 'none';
        App.init();
      }
    };

    const App = {
      cambiarTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.querySelector('[onclick*="'+tab+'"]').classList.add('activo');
        document.getElementById(tab).classList.add('activa');
      },
      init() {
        // Inicializa la grilla de productos obligatoriamente al entrar
        const grid = document.getElementById('productos-grid');
        grid.innerHTML = '';
        PRODUCTOS.forEach(p => {
          const div = document.createElement('div');
          div.className = 'producto';
          div.innerHTML = `<div>${p.icono}</div><h3>${p.nombre}</h3><p>$${p.precio}</p>`;
          grid.appendChild(div);
        });
      }
    };
  </script>
</body>
</html>
