<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja Emporio Don Nino - PREMIUM</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0a0a0a;color:#fff;padding:10px;min-height:100vh;overflow-x:hidden}
    .container{max-width:500px;margin:0 auto;position:relative;padding-top:240px;} 
    .top-fijo { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0a0a0a; z-index: 1000; padding: 10px; }
    .header{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);padding:12px;border-radius:16px;margin-bottom:8px;border:1px solid #ff6600;text-align:center}
    .header h1{font-size:20px;color:#ff6600;font-weight:bold}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:5px}
    .tab{padding:12px 4px;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#888;font-size:12px;font-weight:bold;cursor:pointer}
    .tab.activo{background:#ff6600;color:#000;border-color:#ff6600}
    .pantalla{display:none}.pantalla.activa{display:block}
    .productos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .producto{background:#1a1a1a;border:2px solid #333;border-radius:14px;padding:16px;text-align:center;cursor:pointer}
    .producto.activo{border-color:#ff6600}
    .btn{width:100%;padding:16px;background:#ff6600;border:none;border-radius:14px;font-weight:bold;cursor:pointer;margin-top:10px;text-transform:uppercase}
    .btn-anular{background:#ff3333}
    .btn-costo{background:#00aa00}
    .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-box{background:#1a1a1a;padding:40px;border-radius:20px;border:2px solid #ff6600;width:90%;max-width:400px;text-align:center}
    .alerta{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ff3333;color:#fff;padding:14px;border-radius:12px;z-index:99999}
    .oculto{display:none!important}
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>🥟 EMPORIO DON NINO</h1>
    <input type="password" id="loginPass" placeholder="Clave" style="padding:15px;width:100%;margin:20px 0;background:#000;color:#fff;border:1px solid #333;border-radius:10px">
    <button class="btn" onclick="Auth.login()">ENTRAR</button>
  </div>
</div>

<div class="container" id="appContent" style="display:none;">
    <div class="top-fijo">
      <div class="header"><h1>EMPORIO DON NINO</h1></div>
      <div class="tabs">
        <button class="tab activo" onclick="App.cambiarTab('vender')">VENDER</button>
        <button class="tab" onclick="App.cambiarTab('stock')">STOCK</button>
        <button class="tab" onclick="App.cambiarTab('resumen')">RESUMEN</button>
        <button class="tab" onclick="App.cambiarTab('respaldo')">RESPALDO</button>
      </div>
    </div>
    <div id="alerta" class="alerta oculto"></div>
    <div id="vender" class="pantalla activa"><div id="productos-grid" class="productos-grid"></div><div id="total" style="font-size:24px;color:#ff6600;margin:20px 0">Total: $0</div><button class="btn" onclick="Ventas.ejecutar()">VENDER</button><button class="btn btn-anular" onclick="Ventas.anular()">ANULAR</button><button class="btn btn-costo" onclick="Ventas.liquidar()">COSTO $2.000</button></div>
    <div id="stock" class="pantalla"><button class="btn btn-anular" onclick="StockGestion.cerrarDia()">CERRAR DÍA Y REINICIAR</button></div>
    <div id="resumen" class="pantalla"><h3>HISTORIAL</h3><div id="historial-lista"></div></div>
    <div id="respaldo" class="pantalla"><button class="btn" onclick="Respaldo.descargar()">DESCARGAR RESPALDO</button></div>
</div>

<script>
  const CLAVE_HASH = 'MTk3MQ==';
  const PRODUCTOS = [{id:1,nombre:"Empanada",precio:2500,tipo:"empanada",icono:"🥟"},{id:3,nombre:"Coca lata",precio:1000,tipo:"lata",icono:"🥫"}];
  let estado = { carrito: {}, ventas: [], liquidacionIds: [] };

  const Auth = {
    login() {
      const pass = document.getElementById('loginPass').value;
      if (btoa(pass) !== CLAVE_HASH) { alert('Clave incorrecta'); return; }
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
      App.init();
    }
  };

  const App = {
    init() {
      const grid = document.getElementById('productos-grid');
      grid.innerHTML = PRODUCTOS.map(p => `<div class="producto" onclick="Productos.agregar(${p.id})"><div>${p.icono}</div><h3>${p.nombre}</h3><p>$${p.precio}</p></div>`).join('');
    },
    cambiarTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
      document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
      document.querySelector(`[onclick="App.cambiarTab('${tab}')"]`).classList.add('activo');
      document.getElementById(tab).classList.add('activa');
    }
  };

  const Productos = {
    agregar(id) {
      estado.carrito[id] = (estado.carrito[id] || 0) + 1;
      let total = 0;
      for(let id in estado.carrito) {
        const p = PRODUCTOS.find(pr => pr.id == id);
        const precio = estado.liquidacionIds.includes(id) && p.tipo == 'empanada' ? 2000 : p.precio;
        total += precio * estado.carrito[id];
      }
      document.getElementById('total').innerText = "Total: $" + total;
    }
  };

  const Ventas = {
    ejecutar() { alert('Venta guardada'); estado.carrito = {}; document.getElementById('total').innerText = "Total: $0"; },
    anular() { estado.carrito = {}; document.getElementById('total').innerText = "Total: $0"; },
    liquidar() { alert('Modo liquidación a $2.000'); estado.liquidacionIds = PRODUCTOS.filter(p=>p.tipo=='empanada').map(p=>p.id); }
  };

  const StockGestion = {
    cerrarDia() {
      if(confirm('¿BORRAR TODO Y CERRAR SESIÓN?')) { localStorage.clear(); location.reload(); }
    }
  };

  const Respaldo = {
    descargar() {
      const a = document.createElement('a');
      a.href = "data:text/json," + encodeURIComponent(JSON.stringify(estado.ventas));
      a.download = "respaldo.json"; a.click();
    }
  };
</script>
</body>
</html>
