<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Weones de las Empanadas - CAJA V2.0</title>
  <style>
    /* Estilos originales mantenidos para que todo se vea igual */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0a0a0a;color:#fff;padding:10px;min-height:100vh}
    .container{max-width:500px;margin:0 auto;position:relative;padding-top:240px;}
    .top-fijo { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0a0a0a; z-index: 1000; padding: 10px; }
    .header{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);padding:12px;border-radius:16px;border:1px solid #ff6600;text-align:center;margin-bottom:8px}
    .header h1{font-size:20px;color:#ff6600;font-weight:bold}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:5px}
    .tab{padding:12px 4px;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#888;font-size:12px;font-weight:bold;cursor:pointer}
    .tab.activo{background:#ff6600;color:#000;border-color:#ff6600}
    .pantalla{display:none}.pantalla.activa{display:block}
    .productos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .producto{background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:16px;text-align:center;cursor:pointer}
    .btn{width:100%;padding:16px;background:#ff6600;border:none;border-radius:14px;font-weight:bold;cursor:pointer;margin-top:10px}
    .oculto{display:none!important}
    .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-box{background:#1a1a1a;padding:40px;border-radius:20px;border:2px solid #ff6600;width:90%;max-width:400px;text-align:center}
    .btn-anular{background:#ff3333;color:#fff;}
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>🥟 LOS WEONES 🥟</h1>
      <input type="password" id="loginPass" placeholder="Clave" style="padding:15px;width:100%;margin:20px 0;background:#000;color:#fff;border:1px solid #333">
      <button class="btn" onclick="iniciarSesion()">ENTRAR</button>
    </div>
  </div>

  <div class="container">
    <div class="top-fijo">
      <div class="header"><h1>LOS WEONES DE LAS EMPANADAS</h1></div>
      <div class="tabs">
        <button class="tab activo" onclick="cambiarTab('vender')">VENDER</button>
        <button class="tab" onclick="cambiarTab('stock')">STOCK</button>
        <button class="tab" onclick="cambiarTab('resumen')">RESUMEN</button>
        <button class="tab" onclick="cambiarTab('respaldo')">RESPALDO</button>
      </div>
    </div>

    <div id="vender" class="pantalla activa">
      <div id="productos-grid" class="productos-grid"></div>
      <div style="margin-top:20px">
        <div id="total" style="font-size:30px;color:#ff6600">Total: $0</div>
        <button class="btn" onclick="vender()">VENDER</button>
        <button class="btn btn-anular" onclick="anular()">ANULAR</button>
      </div>
    </div>
    
    <div id="stock" class="pantalla">
      <button class="btn" onclick="cerrarDia()">CERRAR DÍA (REINICIAR TODO)</button>
    </div>
    <div id="resumen" class="pantalla"></div>
    <div id="respaldo" class="pantalla"></div>
  </div>

  <script>
    const CLAVE_HASH = 'MTk3MQ==';
    const PRODUCTOS = [
      {id:1,nombre:"Empanada",precio:2500,icono:"🥟"},
      {id:3,nombre:"Coca lata",precio:1000,icono:"🥫"},
      {id:8,nombre:"Coca 591",precio:1500,icono:"🍶"}
    ];
    
    let carrito = {};

    function iniciarSesion() {
      const pass = document.getElementById('loginPass').value;
      if (btoa(pass) !== CLAVE_HASH) { alert('Clave incorrecta'); return; }
      document.getElementById('loginScreen').style.display = 'none';
      renderProductos();
    }

    function renderProductos() {
      const grid = document.getElementById('productos-grid');
      grid.innerHTML = '';
      PRODUCTOS.forEach(p => {
        const div = document.createElement('div');
        div.className = 'producto';
        div.onclick = () => agregarProducto(p.id);
        div.innerHTML = `<div>${p.icono}</div><h3>${p.nombre}</h3><p>$${p.precio}</p>`;
        grid.appendChild(div);
      });
    }

    function agregarProducto(id) {
      carrito[id] = (carrito[id] || 0) + 1;
      actualizarTotal();
    }

    function actualizarTotal() {
      let total = 0;
      for (let id in carrito) {
        const p = PRODUCTOS.find(pr => pr.id == id);
        total += p.precio * carrito[id];
      }
      document.getElementById('total').innerText = "Total: $" + total;
    }

    function anular() {
      carrito = {};
      actualizarTotal();
      alert('Venta anulada');
    }

    function vender() {
      alert('Venta guardada!');
      carrito = {};
      actualizarTotal();
    }

    function cerrarDia() {
      if (!confirm('¿Cerrar día? Se borrará el stock y la caja inicial.')) return;
      localStorage.clear();
      location.reload();
    }

    function cambiarTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
      document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
      document.querySelector('[onclick*="'+tab+'"]').classList.add('activo');
      document.getElementById(tab).classList.add('activa');
    }
  </script>
</body>
</html>
