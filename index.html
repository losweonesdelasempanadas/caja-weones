    async function cargarCajaInicial() {
        const { data } = await supabase.from('configuracion').select('caja_inicial').eq('id', 1).single();
        if (data) {
            document.getElementById('cajaInicial').value = data.caja_inicial;
            document.getElementById('mostrar-caja-inicial').textContent = '$' + data.caja_inicial.toLocaleString('es-CL');
        }
    }

    window.onload = async () => {
